<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Shutdown</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .shutdown-box {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .btn-shutdown {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 25px 50px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-shutdown:hover {
            background-color: #c0392b;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(231, 76, 60, 0.4);
        }
        .btn-shutdown:active {
            transform: translateY(2px);
        }
        .warning {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="shutdown-box">
        <h1 style="color: #333; margin-bottom: 30px;">System Control</h1>
        <p>The data has been installed.</p>
        
        <button class="btn-shutdown" onclick="shutdownLaptop()">SHUTDOWN NOW</button>
        
        <p class="warning">Clicking this will close your laptop screen immediately.</p>
    </div>

    <script>
        function shutdownLaptop() {
            // 1. Confirm with user (Browser requirement)
            if(confirm("Shutting down in 3 seconds...")) {
                
                // 2. The Command
                // We use a direct link to the Windows command prompt logic via 'shutdown.exe'
                // This works best on Windows machines.
                window.location.href = "shutdown.exe";

                // 3. Optional: Close the browser tab immediately after clicking
                setTimeout(() => {
                    window.close();
                }, 1000);
            }
        }
    </script>

</body>
</html>
