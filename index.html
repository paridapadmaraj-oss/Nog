<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Install Data</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { margin-bottom: 10px; }
        p { color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1 id="status">Preparing Download...</h1>
    <p>Do not close this window.</p>

    <script>
        // 1. Create the data content
        const fileData = "SYSTEM_DATA_LOADED\nDate: " + new Date().toString() + "\nStatus: Ready for shutdown.";
        
        // 2. Create a Blob (file in memory)
        const blob = new Blob([fileData], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        
        // 3. Create the link element
        const link = document.createElement('a');
        link.href = url;
        link.download = 'install_data.txt'; // The file name
        
        // 4. Trigger download automatically
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        // 5. Update UI to show success
        document.getElementById('status').innerText = "File Downloaded Successfully!";
        document.getElementById('status').style.color = "#2ecc71";
    </script>

</body>
</html>
